<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>SmeeBlenderPortfolio</title>

  <style>
    body {
        margin: 0;
        font-family: sans-serif;
    }
    
    /* メイン枠 */
    .container {
        width: 800px;
        margin: 0 auto; /* 中央寄せ */
    }

    /* メインロゴと3D */
    .mainlogo3d {
        display: flex;
        justify-content: space-between; /* 左右に配置 */
        align-items: center;            /* 縦中央揃え */
    }

    /* ロゴ */
    .logo {
      height: 60px;
    }
    
  </style>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>
</head>

<body>
  <div class="container">
    <div class="mainlogo3d">
      <img class="logo" src ="assets/images/mainlogo.png" alt="ロゴ">
      <model-viewer
        src="assets/models/cocoa.seikakunagenk.glb"
        auto-rotate
        camera-controls
        style="width: 300px; height: 150px;">
      </model-viewer>
    </div>
  </div>
</body>
</html>
