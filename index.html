<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>SmeeBlenderPortfolio</title>

  <style>
    body {
        margin: 0;
        font-family: sans-serif;
        background: #f5f5f5;
    }
    
    /* メイン枠 */
    .container {
        width: 800px;
        margin: 0 auto; /* 中央寄せ */
    }

    /* メインロゴと3D */
    .mainlogo3d {
        display: flex;
        justify-content: space-between; /* 左右に配置 */
        align-items: center;            /* 縦中央揃え */
    }

    /* ロゴ */
    .logo {
      height: 200px;
    }

    /* ===== ギャラリー ===== */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 40px;
  padding: 40px;
}

.item {
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
}

.item:active {
  transform: scale(0.96);
}

.circle {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  border: 6px solid #A973BB;
  background-size: cover;
  background-position: center;
  margin: 0 auto 10px;
  transition: 0.3s;
}

.title {
  display: inline-block;
  padding: 8px 18px;
  border-radius: 20px;
  background: #1AE1E0;
  color: #1AB0E1;
  border: 3px solid #fff;
  font-size: 14px;
  transition: 0.3s;
}

/* ホバー */
.item:hover .circle {
  border-color: #ECC839;
  transform: scale(1.05);
}

.item:hover .title {
  background: #FCB6D4;
  color: #fff;
  border-color: #DE5C94;
}

/* ===== ふわっと出現 ===== */
.fade-up {
  opacity: 0;
  transform: translateY(30px) scale(0.95);
  transition: 0.8s ease;
}

.fade-up.show {
  opacity: 1;
  transform: translateY(0) scale(1);
}

.delay-1 { transition-delay: 0.1s; }
.delay-2 { transition-delay: 0.2s; }
.delay-3 { transition-delay: 0.3s; }

/* ===== モーダル ===== */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;

  opacity: 0;
  background: rgba(0,0,0,0);
  pointer-events: none;
  transition: 0.4s;
}

.modal.show {
  opacity: 1;
  background: rgba(0,0,0,0.7);
  pointer-events: auto;
}

.modal-content {
  background: white;
  padding: 20px;
  border-radius: 20px;
  max-width: 80%;
  text-align: center;

  transform: scale(0.8) translateY(30px);
  opacity: 0;
  transition: 0.4s;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.modal.show .modal-content {
  transform: scale(1) translateY(0);
  opacity: 1;
}

.modal img {
  max-width: 100%;
  border-radius: 10px;
}

.modal-content h2 {
  color: #1AB0E1;
}

.modal-content p {
  color: #666;
}

.info {
  font-size: 13px;
}

.point {
  margin-top: 10px;
  padding: 10px;
  background: #fdf0f7;
  border-radius: 10px;
  color: #DE5C94;
}

.close {
  margin-top: 10px;
  cursor: pointer;
}

/* ===== スマホ対応 ===== */
@media (max-width: 768px) {

  .hero {
    flex-direction: column;
    text-align: center;
    padding: 30px 20px;
  }

  .logo {
    font-size: 32px;
    margin-bottom: 20px;
  }

  .hero video {
    width: 100%;
    max-width: 320px;
  }

  .gallery {
    grid-template-columns: repeat(2, 1fr);
    gap: 25px;
    padding: 20px;
  }

  .circle {
    width: 90px;
    height: 90px;
  }

  .title {
    font-size: 13px;
  }

  .modal-content {
    width: 90%;
    padding: 15px;
  }
}
    
  </style>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>
</head>

<body>
  <div class="container">
    <div class="mainlogo3d">
      <img class="logo" src ="assets/images/mainlogo2.png" alt="ロゴ">
      <model-viewer
        src="assets/models/cocoa.seikakunagenk.glb"
        auto-rotate
        rotation-per-second="10deg"
        interaction-policy="none"
        camera-controls
        style="width: 500px; height: 500px;">
      </model-viewer>
    </div>
  

  <!-- ===== ギャラリー ===== -->
  <div class="gallery">
  
    <div class="item fade-up delay-1" onclick="openModal('img1.jpg')">
      <div class="circle" style="background-image:url('img1.jpg')"></div>
      <div class="title">マシュマロ</div>
    </div>
  
    <div class="item fade-up delay-2" onclick="openModal('img2.jpg')">
      <div class="circle" style="background-image:url('img2.jpg')"></div>
      <div class="title">作品2</div>
    </div>
  
    <div class="item fade-up delay-3" onclick="openModal('img3.jpg')">
      <div class="circle" style="background-image:url('img3.jpg')"></div>
      <div class="title">作品3</div>
    </div>
  
  </div>
  
  <!-- ===== モーダル ===== -->
  <div class="modal" id="modal">
    <div class="modal-content">
  
      <img id="modal-img">
  
      <h2 id="modal-title"></h2>
      <p id="modal-desc"></p>
  
      <div class="info">
        ⏱ 制作時間：<span id="modal-time"></span><br>
        🛠 使用ツール：Blender
      </div>
  
      <div class="point">
        💡 こだわりポイント<br>
        <span id="modal-point"></span>
      </div>
  
      <div class="close" onclick="closeModal()">閉じる</div>
  
    </div>
  </div>
</div>

<script>
/* ===== 作品データ ===== */
const works = {
  "img1.jpg": {
    title: "マシュマロ",
    desc: "ふわふわ質感を意識した3Dモデル",
    time: "5時間",
    point: "透明感と柔らかさの表現にこだわりました"
  },
  "img2.jpg": {
    title: "作品2",
    desc: "カラフルなデザインの練習作品",
    time: "3時間",
    point: "配色バランスを意識しています"
  },
  "img3.jpg": {
    title: "作品3",
    desc: "ライティング重視の作品",
    time: "4時間",
    point: "影の出方を細かく調整しました"
  }
};

/* ===== モーダル ===== */
function openModal(src) {
  const modal = document.getElementById("modal");

  document.getElementById("modal-img").src = src;
  document.getElementById("modal-title").textContent = works[src].title;
  document.getElementById("modal-desc").textContent = works[src].desc;
  document.getElementById("modal-time").textContent = works[src].time;
  document.getElementById("modal-point").textContent = works[src].point;

  modal.classList.add("show");
}

function closeModal() {
  document.getElementById("modal").classList.remove("show");
}

/* 外クリックで閉じる */
window.onclick = function(e) {
  const modal = document.getElementById("modal");
  if (e.target === modal) modal.classList.remove("show");
}

/* Escキーで閉じる */
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeModal();
});

/* ===== スクロールアニメ ===== */
const items = document.querySelectorAll('.fade-up');

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('show');
    }
  });
}, { threshold: 0.2 });

items.forEach(item => observer.observe(item));
</script>
</body>
</html>
