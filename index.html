<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Vue & Three.js Project</title>
    <link rel="stylesheet" href="style.css">

    <!-- Vue -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

    <!-- model-viewer（これを追加） -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>

<body>
    <div id="app">
        <h1>{{ title }}</h1>

        <!-- ここに3Dモデル表示 -->
        <div id="canvas-container">
            <model-viewer
              src="assets/models/cocoa.seikakunagenk.glb"
              auto-rotate
              camera-controls>
            </model-viewer>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
